# External sources. All URLs pinned to immutable refs (tags or commit SHAs)
# so a fresh install cannot break because upstream shipped a breaking change.
# Bump these deliberately, not implicitly.

# oh-my-zsh has no version tags; pinned to a specific commit. Bump by
# running `git ls-remote https://github.com/ohmyzsh/ohmyzsh HEAD` and
# updating the SHA in the URL below. Date of current pin: 2026-07-07.
[".oh-my-zsh"]
type = "archive"
url = "https://github.com/ohmyzsh/ohmyzsh/archive/677a4592b18c08ddea737f8aca70bac0e9fc9313.tar.gz"
exact = true
stripComponents = 1

[".oh-my-zsh/custom/themes/powerlevel10k"]
type = "archive"
url = "https://github.com/romkatv/powerlevel10k/archive/v1.15.0.tar.gz"
exact = true
stripComponents = 1

[".oh-my-zsh/custom/plugins/zsh-syntax-highlighting"]
type = "archive"
url = "https://github.com/zsh-users/zsh-syntax-highlighting/archive/0.8.0.tar.gz"
exact = true
stripComponents = 1

[".oh-my-zsh/custom/plugins/zsh-autosuggestions"]
